<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <link rel="icon" href="./assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/editor.css">
    <title>Editor 260713</title>
</head>
<body class="editor-page">
    <header class="editor-header">
        <div>
            <a class="editor-back" href="./index.html">&lt; BACK</a>
            <h1>Editor</h1>
        </div>
        <div class="editor-actions">
            <button class="editor-button" type="button" data-editor-command="reload">RELOAD</button>
            <button class="editor-button" type="button" data-editor-command="download-category">DOWNLOAD CATEGORY</button>
            <button class="editor-button" type="button" data-editor-command="copy-manifest">COPY MANIFEST</button>
            <button class="editor-button editor-button--primary" type="button" data-editor-command="copy-category">COPY CATEGORY</button>
        </div>
    </header>

    <main class="editor-layout json-reveal">
        <aside class="editor-sidebar">
            <section class="editor-panel">
                <h2>Categories</h2>
                <div id="categoryList" class="editor-list" aria-live="polite"></div>
            </section>
            <section class="editor-panel">
                <h2>Items</h2>
                <div class="editor-entry-actions">
                    <button class="editor-button" type="button" data-add-entry="item">+ ITEM</button>
                    <button class="editor-button" type="button" data-add-entry="dropdown">+ ITEMS</button>
                    <button class="editor-button" type="button" data-add-entry="package-matrix">+ LIST</button>
                    <button class="editor-button" type="button" data-add-entry="formula">+ FORMULA</button>
                </div>
                <div id="entryList" class="editor-list" aria-live="polite"></div>
            </section>
        </aside>

        <section class="editor-main">
            <section class="editor-panel">
                <h2>Category</h2>
                <form id="categoryForm" class="editor-form"></form>
            </section>
            <section class="editor-panel">
                <h2>Item</h2>
                <form id="entryForm" class="editor-form"></form>
            </section>
            <section class="editor-panel">
                <h2>Data Preview</h2>
                <div class="editor-preview-actions">
                    <button class="editor-button" type="button" data-editor-command="show-manifest">SHOW MANIFEST</button>
                    <button class="editor-button" type="button" data-editor-command="show-category">SHOW CATEGORY</button>
                    <button class="editor-button" type="button" data-editor-command="copy-preview">COPY PREVIEW</button>
                </div>
                <p id="previewLabel" class="editor-preview-label"></p>
                <pre id="jsonPreview" class="editor-preview"></pre>
            </section>
        </section>
    </main>

    <p id="editorStatus" class="editor-status" role="status"></p>

    <script src="./assets/js/editor.js" type="module"></script>
</body>
</html>
