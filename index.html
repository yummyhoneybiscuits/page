<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.png" type="image/png">
    <title>ef 1.2 260514</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --dim: #444444;
        }
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            letter-spacing: 1px;
            font-size: 14px;
            overflow-y: scroll;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            padding: 20px;
            flex: 1;
            min-width: 320px;
            background: transparent;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--fg);
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--fg); }
        input.regex-invalid { border-color: #ef4444; }
        .group { margin-bottom: 20px; }
        .group-header {
            cursor: pointer;
            padding: 5px 0;
            border-bottom: 1px solid var(--dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .group-header h3 { margin: 10px 0; }
        .group-header .icon {
            display: inline-block;
            transition: transform 0.2s;
            margin-right: 15px;
            width: 20px;
            text-align: center;
        }
        .group:not(.active) .group-header .icon { transform: rotate(-90deg); }
        .group-header:hover { background: #111; }
        .group-content { display: none; }
        .group.active .group-content { display: block; }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--dim);
        }
        .item:last-child { border-bottom: none; }
        .item.highlight {
            background-color: rgba(0, 255, 0, 0.25);
        }
        .item-name {
            flex: 1;
            text-align: left;
        }
        .item-price {
            width: 80px;
            text-align: right;
            margin-right: 15px;
        }
        button {
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--dim);
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
        }
        button:hover {
            background: var(--fg);
            color: var(--bg);
        }
        .flex-row { display: flex; gap: 10px; margin-bottom: 10px; }
        hr { border: none; border-top: 1px solid var(--dim); margin: 20px 0; }
        .header-title { font-size: 20px; font-weight: bold; border-bottom: 1px solid var(--fg); padding-bottom: 10px; margin-bottom: 20px; }
        .total-price {
            font-size: 16px;
            text-align: right;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid var(--dim);
        }
        [data-html2canvas-ignore] { display: inline-block; }
        
        .app-header { max-width: 1100px; margin: 0 auto 30px auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .app-title { margin: 0; font-size: 2rem; background: linear-gradient(45deg, var(--primary-color, #ffffffb0), #bfc0bfb6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; font-weight: 800; text-transform: none; }
        .export-area { padding: 10px; background-color: transparent; }
        .export-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .export-header h2 { margin-bottom: 0; }
        .btn-export { background-color: #10b981; box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2); border-color: #10b981; }
        .btn-export:hover { background-color: #059669; }
        .empty-cart { color: #777777; text-align: center; padding: 20px 0; margin: 0; }
        .cart-item-detail { font-size: 0.9em; color: #888; }
        .cart-item-actions { display: flex; align-items: center; gap: 16px; }
        .cart-item-total { font-size: 1.1em; }
        .btn-danger { padding: 6px 12px; font-size: 0.85rem; width: 90px; }
        .btn-sm { padding: 2px 8px; font-size: 0.75em; }
        .btn-fixed { width: 90px; }
        .action-btns { display: flex; gap: 10px; }
        .divider { border: 0; border-top: 1px solid var(--dim); margin: 20px 0; }

        @keyframes flashGreen {
            0%, 100% { background-color: var(--bg); }
            50% { background-color: rgba(0, 255, 0, 0.2); }
        }
        .flash-success { animation: flashGreen 0.5s ease-out; }

        .panel > h2, .export-header, .code-section h3 {
            min-height: 48px;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        
        .cart-main-header {
            font-size: 0.9em;
            color: #cccccc;
            margin: 15px 0 5px 0;
        }
        .cart-sub-header {
            font-size: 0.9em;
            color: #888;
            margin: 10px 0 5px 0;
            padding-bottom: 4px;
            border-bottom: 1px dashed var(--dim);
        }
        #cartContainer .cart-main-header:first-child { margin-top: 0; }

        .subgroup {
            margin-top: 5px;
            border-left: 2px solid var(--dim);
            padding-left: 10px;
            padding-bottom: 5px;
        }
        .subgroup.highlight {
            background-color: rgba(0, 255, 0, 0.25);
        }
        .subgroup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 5px 0;
        }
        .subgroup-title {
            font-size: 0.9em;
            color: #aaaaaa;
            cursor: pointer;
            user-select: none;
            flex: 1;
        }
        .subgroup-title:hover { color: var(--fg); }
        .subgroup-toggle-icon { display: inline-block; font-size: 0.8em; margin-right: 4px; transition: transform 0.2s; }
        .subgroup:not(.active) .subgroup-toggle-icon { transform: rotate(-90deg); }
        .subgroup-items-container {
            display: none;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 6px;
        }
        .subgroup.active .subgroup-items-container { display: flex; }
        .subgroup-item {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            background: transparent;
            border: 1px solid var(--dim);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }
        .subgroup-item:hover { border-color: var(--fg); }
        .subgroup-item.selected {
            background-color: rgba(0, 255, 0, 0.35);
            border-color: #00ff00;
        }
        #bgArt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            user-select: none;
            z-index: -1;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<canvas id="bgArt" aria-hidden="true"></canvas>

<header class="app-header">
    <h1 class="app-title">
        Endfield 1.2 - 260514 
    </h1>
</header>

<main class="container">
    <section class="panel">
        <h2>wechat@shiroi333</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="SEARCH ITEMS..." oninput="filterItems()">
        <div id="catalogContainer"></div>
    </section>

    <aside class="panel">
        <div id="exportArea" class="export-area">
            <header class="export-header">
                <h2>invoice</h2>
                <div class="action-btns">
                    <button class="btn btn-fixed" data-html2canvas-ignore="true" onclick="clearCart()">CLEAR</button>
                    <button class="btn btn-export btn-fixed" data-html2canvas-ignore="true" onclick="exportToImage()">EXPORT</button>
                </div>
            </header>
            <div id="cartContainer">
                <p class="empty-cart">NO ITEMS SELECTED</p>
            </div>
            <div class="total-price" id="totalPrice">TOTAL: ¥0.00</div>
        </div>

        <section class="code-section">
            <h3>pricing code</h3>
            <div class="flex-row">
                <input type="text" id="generatedCode" class="code-input" placeholder="GENERATED CODE WILL APPEAR HERE" readonly>
                <button class="btn" onclick="copyCode()">COPY</button>
            </div>
            
            <hr class="divider">
            
            <div class="flex-row">
                <input type="text" id="loadCodeInput" class="code-input" placeholder="ENTER PRICING CODE...">
                <button class="btn" onclick="loadFromCode()">LOAD</button>
            </div>
        </section>
    </aside>
</main>

<script>
    let catalogData = [];
    let itemMap = {};

    let cart = {};
    const getEl = id => document.getElementById(id);

    function buildMatcher(query) {
        if (!query) return { matcher: null, valid: true };
        try {
            const re = new RegExp(query, 'i');
            return { matcher: text => re.test(text), valid: true };
        } catch (e) {
            const lower = query.toLowerCase();
            return { matcher: text => text.toLowerCase().includes(lower), valid: false };
        }
    }

    function renderCatalog(searchQuery = '') {
        const query = searchQuery.trim();
        const isSearch = query !== '';
        const { matcher, valid } = buildMatcher(query);
        getEl('searchInput').classList.toggle('regex-invalid', !valid);
        const match = matcher || (() => false);

        const html = catalogData.map((group, index) => {
            const groupMatch = match(group.groupName);

            let itemsHtml = '';
            let hasVisibleItems = false;

            group.children.forEach(child => {
                if (child.type === 'item') {
                    const item = child.data;
                    const itemMatch = match(item.name);
                    if (!isSearch || groupMatch || itemMatch) {
                        hasVisibleItems = true;
                        const highlightClass = (isSearch && (groupMatch || itemMatch)) ? ' highlight' : '';
                        itemsHtml += `
                            <div class="item${highlightClass}">
                                <span class="item-name">${item.name}</span> <span class="item-price">¥${item.price}</span>
                                <button class="btn" onclick="addToCart('${item.id}')">ADD</button>
                            </div>
                        `;
                    }
                } else if (child.type === 'subgroup') {
                    const sub = child;
                    const subMatch = match(sub.subgroupName);
                    const filteredSubItems = isSearch
                        ? sub.items.filter(item => groupMatch || subMatch || match(item.name))
                        : sub.items;
                    if (filteredSubItems.length > 0) {
                        hasVisibleItems = true;
                        const subItemsHtml = filteredSubItems.map(item => {
                            const selectedClass = cart[item.id] ? ' selected' : '';
                            return `
                                <div class="subgroup-item${selectedClass}" data-id="${item.id}" onclick="toggleItem('${item.id}')">
                                    ${item.name} ¥${item.price}
                                </div>
                            `;
                        }).join('');
                        const subItemsIds = filteredSubItems.map(item => item.id).join(',');
                        const subgroupHighlight = isSearch ? ' highlight' : '';
                        const subActive = (isSearch || sub.expandSubgroup) ? ' active' : '';
                        itemsHtml += `
                            <div class="subgroup${subActive}${subgroupHighlight}">
                                <div class="subgroup-header">
                                    <div class="subgroup-title" onclick="this.parentElement.parentElement.classList.toggle('active')">
                                        <span class="subgroup-toggle-icon">▼</span> ${sub.subgroupName}
                                    </div>
                                    <button class="btn btn-sm" onclick="event.stopPropagation(); toggleSelectAll(this, '${subItemsIds}')">ALL</button>
                                </div>
                                <div class="subgroup-items-container">${subItemsHtml}</div>
                            </div>`;
                    }
                }
            });

            if (!hasVisibleItems) return '';

            const isActive = (isSearch || group.expandGroup) ? 'active' : '';
            return `
                <div class="group ${isActive}">
                    <div class="group-header" onclick="this.parentElement.classList.toggle('active')">
                        <h3>${group.groupName}</h3>
                        <span class="icon">▼</span>
                    </div>
                    <div class="group-content"><div class="group-inner">
                        ${itemsHtml}
                    </div></div>
                </div>
            `;
        }).join('');
        
        getEl('catalogContainer').innerHTML = html;
    }

    const filterItems = () => renderCatalog(getEl('searchInput').value);

    function toggleItem(id) {
        if (cart[id]) {
            delete cart[id];
            updateCartUI();
        } else {
            addToCart(id);
        }
    }

        function toggleSelectAll(btn, idsStr) {
        if (!idsStr) return;

            const subgroupEl = btn.closest('.subgroup');
            if (subgroupEl && !subgroupEl.classList.contains('active')) {
                subgroupEl.classList.add('active');
            }

            const ids = idsStr.split(',');
            const allSelected = ids.every(id => cart[id]);
            
            if (allSelected) {
                ids.forEach(id => delete cart[id]);
            } else {
                ids.forEach(id => {
                    const item = itemMap[id];
                    if (item && !cart[id]) cart[id] = 1;
                });
            }
            updateCartUI();
        }

    function addToCart(id) {
        const item = itemMap[id];
        if (!item) return;

        const currentQty = cart[id] || 0;
        if (currentQty >= (item.maxQty || Infinity)) return;
        
        cart[id] = currentQty + 1;
        updateCartUI();
    }

    function removeFromCart(id) {
        if (!cart[id]) return;
        if (--cart[id] <= 0) delete cart[id];
        updateCartUI();
    }

    function clearCart() {
        cart = {};
        updateCartUI();
    }

    function updateCartUI() {
        let cartKeys = Object.keys(cart);
        
        cartKeys.sort((a, b) => {
            const indexA = itemMap[a] ? itemMap[a].sortIndex : 0;
            const indexB = itemMap[b] ? itemMap[b].sortIndex : 0;
            return indexA - indexB;
        });

        document.querySelectorAll('.subgroup-item').forEach(el => {
            if (cart[el.dataset.id]) el.classList.add('selected');
            else el.classList.remove('selected');
        });

        if (cartKeys.length === 0) {
            getEl('cartContainer').innerHTML = '<p class="empty-cart">NO ITEMS SELECTED</p>';
            getEl('totalPrice').innerText = `TOTAL: ¥0.00`;
            getEl('generatedCode').value = ''; 
            return;
        }

        let total = 0;
        const compactData = [];
        let html = '';

        const groupedItems = {};
        cartKeys.forEach(id => {
            const item = itemMap[id];
            if (!item) return;
            
            const mainGroup = item.group || "未分类";
            const subGroup = item.subgroup || '_direct_';
            
            if (!groupedItems[mainGroup]) groupedItems[mainGroup] = {};
            if (!groupedItems[mainGroup][subGroup]) groupedItems[mainGroup][subGroup] = [];
            
            groupedItems[mainGroup][subGroup].push({ id, qty: cart[id], item });
        });

        for (const [mainGroup, subGroups] of Object.entries(groupedItems)) {
            html += `<div class="cart-main-header">${mainGroup}</div>`;
            
            for (const [subGroup, items] of Object.entries(subGroups)) {
                if (subGroup !== '_direct_') {
                    html += `<div class="cart-sub-header">${subGroup}</div>`;
                }
                
                items.forEach(({ id, qty, item }) => {
                    const itemTotal = item.price * qty;
                    total += itemTotal;
                    const maxLabel = qty >= (item.maxQty || Infinity) ? ' MAX' : '';
                    compactData.push(`${id}:${qty}`);

                    html += `
                    <div class="cart-item item">
                        <div class="item-name">
                            ${item.name} <br>
                            <span class="cart-item-detail">¥${item.price} × ${qty}${maxLabel}</span>
                        </div>
                        <div class="cart-item-actions">
                            <strong class="item-price cart-item-total">¥${itemTotal}</strong>
                            <button class="btn btn-danger" data-html2canvas-ignore="true" onclick="removeFromCart('${id}')">REMOVE</button>
                        </div>
                    </div>
                    `;
                });
            }
        }

        getEl('cartContainer').innerHTML = html;
        getEl('totalPrice').innerText = `TOTAL: ¥${total.toLocaleString()}`;
        
        getEl('generatedCode').value = btoa(compactData.join(','));
    }

    function copyCode() {
        const codeInput = getEl('generatedCode');
        if (!codeInput.value) return;
        
        if (navigator.clipboard) {
            navigator.clipboard.writeText(codeInput.value).then(triggerCopyAnimation);
        } else {
            codeInput.select();
            document.execCommand('copy');
            triggerCopyAnimation();
        }
        
        function triggerCopyAnimation() {
            codeInput.classList.add('flash-success');
            setTimeout(() => codeInput.classList.remove('flash-success'), 500);
        }
    }

    function loadFromCode() {
        const inputCodeEl = getEl('loadCodeInput');
        const inputCode = inputCodeEl.value.trim();
        if (!inputCode) return;

        try {
            const decodedStr = atob(inputCode);
            let importData = [];
            
            if (decodedStr.startsWith('[')) {
                importData = JSON.parse(decodedStr);
            } else {
                importData = decodedStr.split(',').map(pair => {
                    const parts = pair.split(':');
                    return [parts[0], parseInt(parts[1], 10)];
                });
            }

            cart = {};
            
            let hasValidItem = false;
            importData.forEach(entry => {
                const id = entry[0];
                const qty = entry[1];
                if (itemMap[id] && typeof qty === 'number' && qty > 0) {
                    const max = itemMap[id].maxQty || Infinity;
                    cart[id] = Math.min(qty, max);
                    hasValidItem = true;
                }
            });

            if (hasValidItem) {
                updateCartUI();
                
                inputCodeEl.classList.add('flash-success');
                setTimeout(() => inputCodeEl.classList.remove('flash-success'), 500);
            }

        } catch (error) {
            console.warn('Failed to parse pricing code:', error);
            alert("INVALID PRICING CODE! 请输入正确的计价码。");
        }
    }

    window.onload = async () => {
        try {
            const response = await fetch('./catalog.json?t=' + Date.now());
            if (!response.ok) throw new Error('Network response was not ok');
            
            const rawData = await response.json();
            
            let globalSortIndex = 0;
            catalogData = rawData.map(group => {
                const groupObj = {
                    groupName: group.category,
                    expandGroup: !!group.expand,
                    children: []
                };

                (group.children || []).forEach(child => {
                    if (child.subCategory) {
                        const subObj = {
                            type: 'subgroup',
                            subgroupName: child.subCategory,
                            expandSubgroup: !!child.expand,
                            items: []
                        };
                        (child.items || []).forEach(item => {
                            item.sortIndex = globalSortIndex++;
                            item.group = group.category;
                            item.subgroup = child.subCategory;
                            itemMap[item.id] = item;
                            subObj.items.push(item);
                        });
                        groupObj.children.push(subObj);
                    } else if (child.id) {
                        child.sortIndex = globalSortIndex++;
                        child.group = group.category;
                        child.subgroup = null;
                        itemMap[child.id] = child;
                        groupObj.children.push({ type: 'item', data: child });
                    }
                });

                return groupObj;
            });
            
            renderCatalog();
        } catch (error) {
            console.error('Failed to load catalog data:', error);
            getEl('catalogContainer').innerHTML = '<p class="empty-cart" style="color: #ef4444;">[ERROR] Failed to load catalog.json</p>';
        }
    };

    function exportToImage() {
        if (Object.keys(cart).length === 0) return;

        const exportArea = getEl('exportArea');

        html2canvas(exportArea, {
            scale: 2,
            backgroundColor: '#000000',
            useCORS: true
        }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            link.download = `${dateStr}.png`;
            link.href = imgData;
            link.click();
        });
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const canvas = document.getElementById('bgArt');
    if (!canvas) throw new Error('bgArt canvas missing');

    const chars = ' .:-=+*#%@';
    const cellW = 8;
    const cellH = 12;
    const fontPx = 12;

    const ctx2d = canvas.getContext('2d');

    let cols = 0, rows = 0;
    let displayW = 0, displayH = 0;
    let renderer, scene, camera, model;
    let rtTarget, pixelBuf;

    function setupSizes() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        displayW = window.innerWidth;
        displayH = window.innerHeight;
        canvas.width = displayW * dpr;
        canvas.height = displayH * dpr;
        canvas.style.width = displayW + 'px';
        canvas.style.height = displayH + 'px';
        ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);

        cols = Math.max(20, Math.floor(displayW / cellW));
        rows = Math.max(20, Math.floor(displayH / cellH));

        if (rtTarget) rtTarget.dispose();
        rtTarget = new THREE.WebGLRenderTarget(cols, rows, {
            minFilter: THREE.LinearFilter,
            magFilter: THREE.LinearFilter,
            format: THREE.RGBAFormat,
            type: THREE.UnsignedByteType
        });
        pixelBuf = new Uint8Array(cols * rows * 4);

        if (camera) {
            camera.aspect = cols / rows;
            camera.updateProjectionMatrix();
        }
    }

    function initScene() {
        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setClearColor(0x000000, 0);

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
        camera.position.set(0, 0, 3.5);

        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const key = new THREE.DirectionalLight(0xffffff, 1.2);
        key.position.set(2, 3, 4);
        scene.add(key);
        const rim = new THREE.DirectionalLight(0x88aaff, 0.6);
        rim.position.set(-3, 1, -2);
        scene.add(rim);

        setupSizes();
    }

    function fitModel(obj) {
        const box = new THREE.Box3().setFromObject(obj);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 2.0;
        const scale = targetSize / maxDim;
        obj.position.sub(center).multiplyScalar(scale);
        obj.scale.setScalar(scale);
    }

    function loadModel() {
        new GLTFLoader().load(
            './model.glb?t=' + Date.now(),
            gltf => {
                model = gltf.scene;
                fitModel(model);
                scene.add(model);
            },
            undefined,
            err => console.warn('GLB load failed:', err)
        );
    }

    function renderAsciiFrame() {
        if (!model) return;
        model.rotation.y += 0.01;
        model.rotation.x = Math.sin(performance.now() * 0.0003) * 0.2;

        renderer.setRenderTarget(rtTarget);
        renderer.render(scene, camera);
        renderer.readRenderTargetPixels(rtTarget, 0, 0, cols, rows, pixelBuf);
        renderer.setRenderTarget(null);

        ctx2d.clearRect(0, 0, displayW, displayH);
        ctx2d.font = `${fontPx}px "Courier New", Courier, monospace`;
        ctx2d.textBaseline = 'top';

        const charsMax = chars.length - 1;
        for (let y = 0; y < rows; y++) {
            const srcY = rows - 1 - y;
            for (let x = 0; x < cols; x++) {
                const i = (srcY * cols + x) * 4;
                const r = pixelBuf[i], g = pixelBuf[i + 1], b = pixelBuf[i + 2], a = pixelBuf[i + 3];
                if (a < 20) continue;
                const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                if (lum < 0.04) continue;
                const ch = chars[Math.min(charsMax, Math.floor(lum * chars.length))];
                ctx2d.fillStyle = `rgb(${r},${g},${b})`;
                ctx2d.fillText(ch, x * cellW, y * cellH);
            }
        }
    }

    let running = true;
    let lastFrame = 0;
    function loop(t) {
        if (running && t - lastFrame > 60) {
            renderAsciiFrame();
            lastFrame = t;
        }
        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', setupSizes);
    document.addEventListener('visibilitychange', () => {
        running = document.visibilityState === 'visible';
    });

    initScene();
    loadModel();
    requestAnimationFrame(loop);
</script>
</body>
</html>
