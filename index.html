<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <link rel="icon" href="./assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/home.css">
    <title>moe</title>
</head>
<body class="home-page">
    <output id="homeWord" class="home-word" aria-live="polite">Ceobe</output>
    <main class="home-links" aria-label="Tools">
        <a href="./menu.html">
            <span>价格表</span>
        </a>
        <a href="./ef-calculator.html">
            <span>计价器</span>
        </a>
        <a href="./editor.html">
            <span>编辑器</span>
        </a>
    </main>
    <script>
        const word = document.getElementById('homeWord');
        const frames = ['Ceobe.moe', 'cEobe.moe', 'ceObe.moe', 'ceoBe.moe', 'ceobE.moe', 'ceobe.Moe', 'ceobe.mOe', 'ceobe.moE', 'ceobe.moe'];
        let frame = 0;
        const animationTimer = window.setInterval(() => {
            frame += 1;
            if (frame >= 50) {
                window.clearInterval(animationTimer);
                window.location.href = './ef-calculator.html';
                return;
            }
            word.textContent = frames[frame % frames.length];
        }, 100);
        document.querySelectorAll('.home-links a').forEach(link => {
            link.addEventListener('click', () => {
                window.clearInterval(animationTimer);
            }, { once: true });
        });
    </script>
</body>
</html>
